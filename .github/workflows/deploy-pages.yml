name: Deploy Glossary to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Ensure output directory exists
        run: mkdir -p _site

      - name: Generate glossary webapp
        run: python -m lookml_glossary examples/ecommerce.model.lkml -f webapp -o _site/index.html

      - name: Generate glossary JSON
        run: python -m lookml_glossary examples/ecommerce.model.lkml -f json -o _site/glossary.json

      - name: Include drift report if available
        run: |
          if [ -f examples/latest_drift_report.json ]; then
            cp examples/latest_drift_report.json _site/drift_report.json
          else
            echo '{"drift":[],"summary":{"total":0,"errors":0,"warnings":0,"info":0}}' > _site/drift_report.json
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
